name: Capacitor Build
on:
  repository_dispatch:
    types: [trigger-build]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Install Dependencies
        run: npm install
        
      - name: Build Web Assets
        run: npm run build
        
      - name: Sync Capacitor
        run: npx cap sync
        
      - name: Auto-fix Google Services Package Name
        run: |
          if [ -f android/app/google-services.json ]; then
            APP_ID=$(grep -oP 'applicationId\s+"\K[^"]+' android/app/build.gradle || grep -oP "applicationId\s+'\K[^']+" android/app/build.gradle)
            if [ ! -z "$APP_ID" ]; then
              echo "Auto-fixing package_name to $APP_ID in google-services.json to prevent build failure"
              sed -i -E 's/"package_name":\s*"[^"]+"/"package_name": "'"$APP_ID"'"/g' android/app/google-services.json
            fi
          fi
        
      - name: Build Android APK
        run: |
          cd android
          gradle wrapper --gradle-version 8.2.1
          chmod +x gradlew
          ./gradlew assembleRelease
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release.apk
